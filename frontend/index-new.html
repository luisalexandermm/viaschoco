<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#030213" />
  <meta name="robots" content="index, follow" />
  <meta name="description" content="Vías del Chocó: plataforma colaborativa para reportes de estado de carreteras en tiempo real." />
  <title>Vías del Chocó - Información en Tiempo Real</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .header-brand { color: #030213; }
    .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .status-good { background: #d4edda; color: #155724; }
    .status-regular { background: #fff3cd; color: #856404; }
    .status-bad { background: #f8d7da; color: #721c24; }
    .status-closed { background: #e2e3e5; color: #383d41; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app"></div>

  <!-- Scripts de React desde CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [roads, setRoads] = useState([
        { id: 1, title: "Vía Quibdó - Medellín", status: "Regular", from: "Quibdó", to: "Medellín", km: "240 km" },
        { id: 2, title: "Vía Quibdó - Pereira", status: "Regular", from: "Quibdó", to: "Pereira", km: "195 km" },
        { id: 3, title: "Vía Quibdó - Istmina", status: "Buena", from: "Quibdó", to: "Istmina", km: "86 km" },
      ]);

      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Cargar reportes desde el servidor
        fetch('/api/reports')
          .then(res => res.json())
          .then(data => {
            setReports(data);
            setLoading(false);
          })
          .catch(err => {
            console.error('Error cargando reportes:', err);
            setLoading(false);
          });
      }, []);

      const getStatusColor = (status) => {
        switch(status) {
          case 'Buena': return '#22c55e';
          case 'Regular': return '#eab308';
          case 'Mala': return '#f97316';
          case 'Cerrada': return '#ef4444';
          default: return '#6b7280';
        }
      };

      const getStatusClass = (status) => {
        switch(status) {
          case 'Buena': return 'status-good';
          case 'Regular': return 'status-regular';
          case 'Mala': return 'status-bad';
          case 'Cerrada': return 'status-closed';
          default: return '';
        }
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100">
          {/* Header */}
          <header className="bg-white shadow-md sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 py-4">
              <div className="flex justify-between items-center">
                <div>
                  <h1 className="text-3xl font-bold header-brand">Vías del Chocó</h1>
                  <p className="text-gray-600 text-sm">Sistema de Monitoreo de Carreteras en Tiempo Real</p>
                </div>
                <div className="text-right">
                  <div className="text-sm text-gray-500">Estado del Sistema</div>
                  <div className="text-lg font-bold text-green-600">✓ En línea</div>
                </div>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="max-w-6xl mx-auto px-4 py-8">
            {/* Stats Section */}
            <section className="mb-8">
              <h2 className="text-2xl font-bold mb-4 text-gray-800">Estado General de las Vías</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div className="p-4 rounded-lg text-center bg-white shadow-md">
                  <div className="text-3xl font-bold text-green-600">3</div>
                  <div className="text-sm font-semibold text-gray-600">Buenas</div>
                </div>
                <div className="p-4 rounded-lg text-center bg-white shadow-md">
                  <div className="text-3xl font-bold text-yellow-600">3</div>
                  <div className="text-sm font-semibold text-gray-600">Regulares</div>
                </div>
                <div className="p-4 rounded-lg text-center bg-white shadow-md">
                  <div className="text-3xl font-bold text-orange-600">1</div>
                  <div className="text-sm font-semibold text-gray-600">Malas</div>
                </div>
                <div className="p-4 rounded-lg text-center bg-white shadow-md">
                  <div className="text-3xl font-bold text-red-600">1</div>
                  <div className="text-sm font-semibold text-gray-600">Cerradas</div>
                </div>
              </div>
            </section>

            {/* Roads Section */}
            <section className="mb-8">
              <h2 className="text-2xl font-bold mb-4 text-gray-800">Vías Principales</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {roads.map(road => (
                  <div key={road.id} className="p-6 bg-white rounded-lg shadow-md hover:shadow-lg transition">
                    <div className="flex justify-between items-start mb-3">
                      <h3 className="font-bold text-lg text-gray-800">{road.title}</h3>
                      <span className={`status-badge ${getStatusClass(road.status)}`}>
                        {road.status}
                      </span>
                    </div>
                    <div className="space-y-2 text-sm text-gray-600 mb-4">
                      <p><strong>De:</strong> {road.from}</p>
                      <p><strong>Hacia:</strong> {road.to}</p>
                      <p><strong>Distancia:</strong> {road.km}</p>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* Reports Section */}
            <section className="mb-8">
              <h2 className="text-2xl font-bold mb-4 text-gray-800">Últimos Reportes</h2>
              {loading ? (
                <div className="text-center py-8">
                  <div className="inline-block">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-600"></div>
                  </div>
                  <p className="mt-4 text-gray-600">Cargando reportes...</p>
                </div>
              ) : reports.length > 0 ? (
                <div className="space-y-4">
                  {reports.slice(0, 5).map(report => (
                    <div key={report.id} className="p-4 bg-white rounded-lg shadow-md border-l-4" style={{borderColor: getStatusColor(report.status)}}>
                      <div className="flex justify-between items-start mb-2">
                        <div>
                          <h3 className="font-bold text-gray-800">{report.title || 'Reporte sin título'}</h3>
                          <p className="text-sm text-gray-600">{report.location || 'Ubicación no especificada'}</p>
                        </div>
                        <span className={`status-badge ${getStatusClass(report.status)}`}>
                          {report.status}
                        </span>
                      </div>
                      <p className="text-sm text-gray-700 mb-2">{report.message}</p>
                      <div className="flex justify-between text-xs text-gray-500">
                        <span>Reportado por: {report.user}</span>
                        <span>{new Date(report.time).toLocaleString('es-CO')}</span>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="p-8 bg-white rounded-lg shadow-md text-center">
                  <p className="text-gray-600">No hay reportes disponibles</p>
                </div>
              )}
            </section>

            {/* Info Section */}
            <section className="bg-blue-50 border-l-4 border-blue-600 p-6 rounded-lg">
              <h3 className="font-bold text-lg text-blue-900 mb-2">Información del Sistema</h3>
              <p className="text-blue-800 text-sm mb-3">
                Vías del Chocó es una plataforma colaborativa que permite a los usuarios reportar 
                el estado en tiempo real de las carreteras en el departamento del Chocó.
              </p>
              <div className="text-sm text-blue-700 space-y-1">
                <p>✓ Backend: Node.js/Express corriendo en puerto 3000</p>
                <p>✓ WebSocket: Socket.io habilitado</p>
                <p>✓ Base de datos: Datos simulados (en desarrollo)</p>
              </div>
            </section>
          </main>

          {/* Footer */}
          <footer className="bg-gray-900 text-white mt-16 py-8">
            <div className="max-w-6xl mx-auto px-4 text-center">
              <p>&copy; 2025 Vías del Chocó. Sistema de Monitoreo de Carreteras.</p>
              <p className="text-gray-400 text-sm mt-2">Todos los derechos reservados.</p>
            </div>
          </footer>
        </div>
      );
    }

    // Renderizar la app
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);
  </script>
</body>
</html>
