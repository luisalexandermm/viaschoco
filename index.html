function LoginModal({ onClose, onShowRegister, onLogin }) {
  async function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const email = form.email.value.trim();
    const pass = form.password.value.trim();

    if (!email || !pass) {
      alert('Ingresa correo y contraseña');
      return;
    }

    // Acceso directo para el administrador
    if (email === 'alrxandermarturana76.admin@gmail.com' && pass === '3145312045La') {
      onLogin(email, 'admin');
      return;
    }

    const response = await fetch('/.netlify/functions/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });

    if (response.ok) {
      const user = await response.json();
      if (user.exists) {
        onLogin(email, user.role);
      } else {
        alert('El usuario no está registrado. Por favor, regístrate primero.');
      }
    } else {
      alert('Error al verificar el usuario. Intenta nuevamente.');

        >
          ✕

function LiveRoadStatus({ roads }) {
  const statusColor = (status) => {
    return status === 'Buena' ? '#22c55e'
      : status === 'Regular' ? '#eab308'
      : status === 'Mala' ? '#f97316'
      : status === 'Cerrada' ? '#ef4444'
      : '#6b7280';
  };

  const section = (scopeName, label) => {
    const items = roads.filter(r => r.scope === scopeName);
    if (!items.length) return null;
    return (
      <div className="mb-5">
        <h4 className="text-xl font-bold mb-3 text-gray-800">{label}</h4>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          {items.map(r => (
            <div key={r.id} className="p-4 bg-white rounded-xl border shadow-sm">
              <div className="flex justify-between items-start gap-3 mb-2">
                <div>
                  <h5 className="font-bold text-base text-gray-800">{r.title}</h5>
                  <p className="text-xs text-gray-500">{r.from} → {r.to} ({r.km})</p>
                </div>
                <span className="text-xs font-bold text-white px-2 py-1 rounded" style={{backgroundColor: statusColor(r.status)}}>{r.status}</span>
              </div>
              <p className="text-xs text-gray-600 mb-2">{r.desc}</p>
              <div className="grid grid-cols-2 gap-2 text-xs text-gray-700">
                <div className="rounded p-2 bg-gray-50">
                  <strong>Humedad:</strong><br />{r.humidity}%
                </div>
                <div className="rounded p-2 bg-gray-50">
                  <strong>Precipitación:</strong><br />{r.precip}%
                </div>
                <div className="rounded p-2 bg-gray-50">
                  <strong>Temp:</strong><br />{r.temperature}°C
                </div>
                <div className="rounded p-2 bg-gray-50">
                  <strong>Revisado:</strong><br />{r.lastChecked}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  };

  return (
    <section className="mb-10">
      <div className="mb-4">
        <h2 className="text-3xl font-bold text-gray-800">🚦 Estado en Vivo de las Vías</h2>
        <p className="text-gray-600 mt-1">Conexión Chocó-Colombia e interior (humedad, precipitación, temperatura, última lectura).</p>
      </div>
      {section('exterior', 'Vías Chocó ↔ Colombia')}
      {section('interior', 'Vías del Interior del Chocó')}
    </section>
  );
}

function MapComponent({ reports, highlightReportId, enableClickToSet, onMapClick, tempMarker }) {
  const mapRef = React.useRef(null);
  const mapInstance = React.useRef(null);
  const markers = React.useRef({});
  // highlightReportId se manejará desde App mediante prop para abrir popup y centrar
  const propsRef = React.useRef({});

  const getMarkerColor = (report) => {
    if (report && report.outsideChoco) return '#6b7280'; // gris para fuera del Chocó
    const status = report && report.status ? report.status : report;
    switch(status) {
      case 'Buena': return '#22c55e';
      case 'Regular': return '#eab308';
      case 'Mala': return '#f97316';
      case 'Cerrada': return '#ef4444';
      default: return '#6b7280';
    }
  };

  const createMarkerIcon = (color) => {
    return L.divIcon({
      html: `
        <div style="
          background-color: ${color};
          width: 30px;
          height: 30px;
          border-radius: 50%;
          border: 3px solid white;
          box-shadow: 0 2px 8px rgba(0,0,0,0.3);
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
          color: white;
          font-size: 16px;
        ">
          📍
        </div>
      `,
      iconSize: [36, 36],
      className: 'custom-marker'
    });
  };

  React.useEffect(() => {
    // Esperar a que Leaflet esté disponible y el DOM esté listo
    if (!window.L || !mapRef.current) return;

    // Inicializar mapa
    if (!mapInstance.current) {
      mapInstance.current = L.map(mapRef.current).setView([5.6929, -75.7519], 8);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19,
        minZoom: 5
      }).addTo(mapInstance.current);
    }

    // Limpiar marcadores antiguos
    Object.values(markers.current).forEach(marker => {
      mapInstance.current.removeLayer(marker);
    });
    markers.current = {};

    // Agregar marcadores de reportes
    reports.forEach(report => {
      if (report.lat && report.lng) {
        const marker = L.marker([report.lat, report.lng], {
          icon: createMarkerIcon(getMarkerColor(report))
        }).bindPopup(`
          <div style="font-size: 12px; width: 200px;">
            <strong>${report.title}</strong><br/>
            <span style="display:inline-block; margin: 4px 0; padding: 4px 8px; background-color: ${getMarkerColor(report.status)}; color: white; border-radius: 4px; font-weight: bold; font-size: 11px;">
              ${report.status}
            </span><br/>
            <small><strong>Ubicación:</strong> ${report.location}</small><br/>
            <small><strong>Estado:</strong> ${report.message.substring(0, 50)}...</small><br/>
            <small><strong>Usuario:</strong> ${report.user}</small><br/>
            <small><strong>Reportado:</strong> ${report.time}</small>
          </div>
        `).addTo(mapInstance.current);

        markers.current[report.id] = marker;
      }
    });

    // si hay marcador temporal (tempMarker) mostrarlo
    if (window.L && tempMarker && tempMarker.lat && tempMarker.lng) {
      // quitar previo
      if (markers.current.__temp) mapInstance.current.removeLayer(markers.current.__temp);
      const m = L.marker([tempMarker.lat, tempMarker.lng], { opacity: 0.85 }).addTo(mapInstance.current);
      markers.current.__temp = m;
    }
  }, [reports]);

    // efecto para abrir popup de un reporte recien creado y centrar mapa
  React.useEffect(() => {
    if (!window.L || !mapInstance.current) return;
    const id = highlightReportId || propsRef.current.highlightReportId;
    if (!id) return;
    const marker = markers.current[id];
    if (marker) {
      try {
        marker.openPopup();
        mapInstance.current.setView(marker.getLatLng(), Math.max(mapInstance.current.getZoom(), 12));
      } catch (err) {
        console.warn('No se pudo abrir popup para el reporte', id, err);
      }
    }
    // limpiar el highlight en la referencia para evitar re-aperturas
    propsRef.current.highlightReportId = null;
  }, [reports, highlightReportId]);

  // manejar clicks en el mapa para fijar coordenadas cuando esté activado
  React.useEffect(() => {
    if (!window.L || !mapInstance.current) return;
    function onClick(e){
      if (!enableClickToSet) return;
      const { lat, lng } = e.latlng;
      if (typeof onMapClick === 'function') onMapClick({ lat, lng });
    }
    mapInstance.current.on('click', onClick);
    return () => mapInstance.current.off('click', onClick);
  }, [enableClickToSet, onMapClick]);

  return (
    <div 
      ref={mapRef} 
      style={{
        width: '100%',
        height: '500px',
        borderRadius: '12px',
        boxShadow: '0 4px 12px rgba(0,0,0,0.1)',
        border: '1px solid #e5e7eb',
        marginBottom: '2rem'
      }}
    ></div>
  );
}

  const approveToggle = async (id) => {
    const report = reports.find(r => r.id === id);
    const updated = { ...report, approved: !report.approved };
    setReports(prev => prev.map(r => r.id === id ? updated : r));

    if (apiAvailable) {
      try {
        const res = await fetch(`/.netlify/functions/reports?id=${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updated)
        });
        if (!res.ok) console.warn('Error al actualizar en servidor');
      } catch (err) {
        console.warn('Error de conexión:', err.message);
      }
    }
  };

  const removeReport = async (id) => {
    if (!confirm('¿Eliminar este reporte?')) return;
    setReports(prev => prev.filter(r => r.id !== id));

    if (apiAvailable) {
      try {
        const res = await fetch(`/.netlify/functions/reports?id=${id}`, {
          method: 'DELETE'
        });
        if (!res.ok) console.warn('Error al eliminar en servidor');
      } catch (err) {
        console.warn('Error de conexión:', err.message);
      }
    }

  const editReport = async (r) => {
    const newMsg = prompt('Editar descripción', r.message);
    if (newMsg == null) return;
    const updated = { ...r, message: newMsg };
    setReports(prev => prev.map(rep => rep.id === r.id ? updated : rep));

    if (apiAvailable) {
      try {
        const res = await fetch(`/.netlify/functions/reports?id=${r.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },

function App() {
  const [showLogin, setShowLogin] = React.useState(false);

  const [userName, setUserName] = React.useState('');
  const [roads, setRoads] = React.useState(roadsData);
  const [reports, setReports] = React.useState(reportsData);
  const [activeTab, setActiveTab] = React.useState('all');
  const [showDetails, setShowDetails] = React.useState(null);
  // removed showAbout state: About section is now part of page flow
  const [recentReports, setRecentReports] = React.useState([]); // reportes hechos en la sesión
  const [showMenu, setShowMenu] = React.useState(false); // menú hamburguesa móvil
  const [users, setUsers] = React.useState(() => {
    // Inicializar con usuarios que aparecen en los reportes
    const uniq = Array.from(new Set(reportsData.map(r => r.user))).map(u => ({ name: u, blocked: false, role: 'user' }));
    return uniq;
  });
  const [highlightReportId, setHighlightReportId] = React.useState(null);
  // SPA view: 'main' | 'admin'
  const [view, setView] = React.useState('main');
  const [mapClickMode, setMapClickMode] = React.useState(false); // true cuando el usuario activa 'marcar en mapa'
  const [pendingCoords, setPendingCoords] = React.useState(null); // {lat,lng} seleccionadas desde el mapa
  const [apiAvailable, setApiAvailable] = React.useState(false); // true si el servidor está disponible
  const [selectedCoords, setSelectedCoords] = React.useState(null); // {lat,lng} para llenar el formulario

  // Cargar datos del servidor al inicializar
  React.useEffect(() => {
    const loadFromServer = async () => {
      try {
        // Primero comprobar health para saber si Neon/Netlify Functions están disponibles
        const healthRes = await fetch('/.netlify/functions/health');
        if (healthRes.ok) {
          const h = await healthRes.json();
          if (h && h.ok) {
            setApiAvailable(true);
            // Si está disponible, cargar reportes reales
            try {
              const res = await fetch('/.netlify/functions/reports');
              if (res.ok) {
                const data = await res.json();
                setReports(data);
              } else {
                console.warn('No se pudo obtener reportes desde el servidor:', res.statusText);
              }
            } catch (err) {
              console.warn('Error obteniendo reportes:', err.message);
            }
            return;
          }
        }
        // Si llegamos aquí, health falló o no devolvió ok
        setApiAvailable(false);
      } catch (err) {
        console.warn('Servidor no disponible, usando datos en memoria:', err.message);
        setApiAvailable(false);
      }
    };
    loadFromServer();
  }, []);

  // Actualización en vivo de humedad/precip/temperatura para cada vía
  React.useEffect(() => {
    const fetchWeatherData = async () => {
      const API_KEY = 'TU_API_KEY_DE_OPENWEATHER_AQUI'; // Reemplaza con tu API key gratuita de OpenWeather
      const updatedRoads = await Promise.all(roads.map(async (road) => {
        const coords = roadCoords[road.id];
        if (!coords) return road;

        try {
          const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${coords.lat}&lon=${coords.lng}&appid=${API_KEY}&units=metric`);
          if (!response.ok) throw new Error('API error');

          const data = await response.json();
          const humidity = data.main.humidity;
          const temperature = Math.round(data.main.temp);
          const precip = data.rain ? Math.round(data.rain['1h'] * 100) : 0; // Precipitación en mm/hora, convertir a %

          // Determinar status basado en condiciones reales
          let status = 'Buena';
          if (humidity > 85 || precip > 50) status = 'Mala';
          else if (humidity > 75 || precip > 25) status = 'Regular';

          return {
            ...road,
            humidity,
            precip,
            temperature,
            status,
            lastChecked: new Date().toLocaleTimeString('es-CO'),
            updated: `${new Date().toLocaleDateString('es-ES')} ${new Date().toLocaleTimeString('es-CO')}`
          };
        } catch (error) {
          console.warn(`Error obteniendo clima para ${road.title}:`, error.message);
          // Fallback a simulación si falla la API
          const fluctuate = (value, range) => Math.max(0, Math.min(100, value + (Math.random() * (range * 2) - range)));
          return {
            ...road,
            humidity: Math.round(fluctuate(road.humidity ?? 70, 6)),
            precip: Math.round(fluctuate(road.precip ?? 40, 8)),
            temperature: Math.round(Math.max(12, Math.min(35, (road.temperature ?? 24) + (Math.random() * 3 - 1.5)))),
            lastChecked: new Date().toLocaleTimeString('es-CO'),
            updated: `${new Date().toLocaleDateString('es-ES')} ${new Date().toLocaleTimeString('es-CO')}`
          };
        }
      }));

      setRoads(updatedRoads);
    };

    // Fetch inicial
    fetchWeatherData();

    // Actualizar cada 10 minutos (600000 ms)
    const interval = setInterval(fetchWeatherData, 600000);

    return () => clearInterval(interval);
  }, []);

  // Función mejorada para geocodificar ubicación y validar con clima
  const geocodeAndValidateLocation = async (locationText, roadId) => {
    const API_KEY = 'TU_API_KEY_DE_OPENWEATHER_AQUI'; // Reemplaza con tu API key

    try {
      // Primero intentar geocodificar la ubicación usando OpenWeather Geocoding
      const geocodeUrl = `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(locationText + ', Choco, Colombia')}&limit=5&appid=${API_KEY}`;
      const geocodeResponse = await fetch(geocodeUrl);

      if (geocodeResponse.ok) {
        const geocodeData = await geocodeResponse.json();

        // Filtrar resultados que estén dentro del Chocó
        const chocoResults = geocodeData.filter(result => {
          const lat = result.lat;
          const lng = result.lon;
          // Límites aproximados del Chocó
          return lat >= 4.0 && lat <= 8.0 && lng >= -78.5 && lng <= -75.0;
        });

        if (chocoResults.length > 0) {
          const bestResult = chocoResults[0];
          const lat = bestResult.lat;
          const lng = bestResult.lon;

          // Obtener datos climáticos para validar la ubicación
          const weatherResponse = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lng}&appid=${API_KEY}&units=metric`);
          if (weatherResponse.ok) {
            const weatherData = await weatherResponse.json();
            return {
              lat,
              lng,
              weather: {
                humidity: weatherData.main.humidity,
                temperature: Math.round(weatherData.main.temp),
                description: weatherData.weather[0].description,
                validated: true
              }
            };
          }
        }
      }

      // Fallback: usar coordenadas por defecto de la vía
      const roadCoords = roadCoords[roadId];
      if (roadCoords) {
        return {
          lat: roadCoords.lat + (Math.random() - 0.5) * 0.02, // pequeño jitter
          lng: roadCoords.lng + (Math.random() - 0.5) * 0.02,
          weather: null,
          fallback: true
        };
      }

      return null;
    } catch (error) {
      console.warn('Error en geocodificación:', error);
      return null;
    }
  };

  // Función para añadir reporte y actualizar vía si aplica
  const handleNewReport = async (reportData) => {
    // Helper: validar si coordenadas están dentro de los límites aproximados del Chocó
    // GeoJSON aproximado (rectángulo) del contorno del Chocó.
    const chocoPolygon = {
      type: 'Feature',
      properties: {},
      geometry: {
        type: 'Polygon',
        coordinates: [[
          [-78.5, 4.0],
          [-75.0, 4.0],
          [-75.0, 8.0],
          [-78.5, 8.0],
          [-78.5, 4.0]
        ]]
      }
    };

    const isWithinChoco = (lat, lng) => {
      if (!lat || !lng) return false;
      try {
        if (window.turf && typeof window.turf.booleanPointInPolygon === 'function') {
          const pt = window.turf.point([Number(lng), Number(lat)]);
          return window.turf.booleanPointInPolygon(pt, chocoPolygon);
        }
      } catch (e) {
        console.warn('turf error, falling back to bbox', e);
      }
      // Fallback bbox
      const minLat = 4.0;
      const maxLat = 8.0;
      const minLng = -78.5;
      const maxLng = -75.0;
      return lat >= minLat && lat <= maxLat && lng >= minLng && lng <= maxLng;
    };
    // Crear nuevo reporte con id
    const newId = Math.max(...reports.map(r => r.id), 0) + 1;
    const roadId = parseInt(reportData.road);

    // Usar geocodificación mejorada para obtener coordenadas precisas
    let locationData = null;
    if (reportData.location && reportData.location.trim()) {
      locationData = await geocodeAndValidateLocation(reportData.location, roadId);
    }

    // Usar coordenadas geocodificadas o por defecto
    let lat = reportData.lat || (locationData ? locationData.lat : null);
    let lng = reportData.lng || (locationData ? locationData.lng : null);

    // Si no hay coordenadas, usar las de la vía con jitter
    if ((!lat || !lng) && roadCoords[roadId]) {
      const jitter = () => (Math.random() - 0.5) * 0.02;
      lat = roadCoords[roadId].lat + jitter();
      lng = roadCoords[roadId].lng + jitter();
    }

    // Evitar que un nuevo reporte caiga exactamente en la misma ubicación
    // que reportes existentes (o los recientes de la sesión). Aplicamos
    // re-jitter hasta obtener coordenadas suficientemente distintas.
    const isTooClose = (aLat, aLng, bLat, bLng, threshold = 0.0015) => {
      if (!aLat || !aLng || !bLat || !bLng) return false;
      return Math.abs(aLat - bLat) < threshold && Math.abs(aLng - bLng) < threshold;
    };

    const allReports = [...reports, ...recentReports];
    if (lat && lng) {
      let attempts = 0;
      const maxAttempts = 12;
      const jitter = () => (Math.random() - 0.5) * 0.02;
      while (attempts < maxAttempts && allReports.some(r => isTooClose(lat, lng, r.lat, r.lng))) {
        lat = Number(lat) + jitter();
        lng = Number(lng) + jitter();
        attempts++;
      }
    }

    const newReport = {
      id: newId,
      ...reportData,
      user: userName,
      time: 'Hace 0 min',
      lat,
      lng,
      approved: false,
      // Agregar información de validación geocodificada
      geocoded: locationData ? {
        validated: locationData.weather?.validated || false,
        weather: locationData.weather,
        fallback: locationData.fallback || false
      } : null
    };

    // Marcar si el punto está fuera del Chocó (para poder mostrar badge/color)
    const latNumAfter = lat ? Number(lat) : null;
    const lngNumAfter = lng ? Number(lng) : null;
    const outsideChocoFlag = latNumAfter && lngNumAfter ? !isWithinChoco(latNumAfter, lngNumAfter) : false;
    newReport.outsideChoco = outsideChocoFlag;

    // Validación geográfica mejorada
    const allowedOutsideRoads = [1, 2]; // IDs de vías que pueden estar fuera del Chocó (Medellín y Pereira)
    const latNum = lat ? Number(lat) : null;
    const lngNum = lng ? Number(lng) : null;

    if (!allowedOutsideRoads.includes(roadId)) {
      // Para vías dentro del Chocó, validar ubicación
      if (latNum && lngNum && !isWithinChoco(latNum, lngNum)) {
        alert('Las coordenadas deben estar dentro del departamento del Chocó. Se usaron coordenadas aproximadas de la vía.');
        // Usar coordenadas de la vía como fallback
        if (roadCoords[roadId]) {
          lat = roadCoords[roadId].lat + (Math.random() - 0.5) * 0.02;
          lng = roadCoords[roadId].lng + (Math.random() - 0.5) * 0.02;
        }
      }
    }

    // Si no hay coordenadas válidas, impedir creación
    if (!latNum || !lngNum) {
      alert('No se pudieron determinar las coordenadas. Por favor selecciona una ubicación en el mapa.');
      return;
    }

    // Mostrar mensaje de validación si se geocodificó exitosamente
    if (locationData && locationData.weather?.validated) {
      console.log(`✅ Ubicación geocodificada: ${reportData.location} -> ${latNum.toFixed(4)}, ${lngNum.toFixed(4)}`);
      console.log(`🌤️ Condiciones climáticas: ${locationData.weather.temperature}°C, ${locationData.weather.humidity}% humedad`);
    }

    // Eliminar reportes antiguos de la MISMA vía Y MISMA ubicación (km)
    const filteredReports = reports.filter(r => 
      !(r.title === reportData.title && r.location === reportData.location)
    );
    const updatedReports = [newReport, ...filteredReports];
    setReports(updatedReports);
    setRecentReports([newReport, ...recentReports]);

    // actualizar estado de la vía si aplica
    const roadIndex = roads.findIndex(r => r.id === roadId);
    if (roadIndex !== -1) {
      const updatedRoads = [...roads];
      updatedRoads[roadIndex].status = reportData.status;
      updatedRoads[roadIndex].updated = new Date().toLocaleString('es-ES');
      setRoads(updatedRoads);
    }

    // si el report creado tiene coordenas, pedir a MapComponent que lo resalte
    setHighlightReportId(newId);
    setShowReport(false);
    // si veníamos en modo marcar en mapa, desactivar y limpiar pending coords
    setMapClickMode(false);
    setPendingCoords(null);
    // quitar highlight luego de un instante para evitar reaperturas repetidas
    setTimeout(() => setHighlightReportId(null), 1500);

    // Enviar al servidor si está disponible
    if (apiAvailable) {
      try {
  const res = await fetch('/.netlify/functions/reports', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newReport)
        });
        if (!res.ok) {
          console.warn('Error al guardar en servidor:', res.statusText);
        }
      } catch (err) {
        console.warn('Error de conexión al guardar reporte:', err.message);

  };

  // Manejar click en mapa para seleccionar coordenadas en el formulario
  const handleMapClick = ({ lat, lng }) => {
    setSelectedCoords({ lat, lng });

    // Hacer scroll al campo de latitud para confirmar que se seleccionó

  };

  // Si no autenticado, muestra header fullscreen
  if (!isAuthenticated) {
    return (
      <div className="w-full h-screen bg-cover bg-center flex flex-col items-center justify-center relative overflow-hidden" 
           style={{backgroundImage: "url('img/logo.jpeg')"}}>
        {/* Overlay oscuro */}
        <div className="absolute inset-0 bg-black/40"></div>
        
        {/* Contenido centrado */}
        <div className="relative z-10 text-center text-white px-4 max-w-2xl">
          <div className="mb-8">
            <img src="img/logoviaa.png" alt="Vías del Chocó" className="h-20 rounded-lg shadow-lg mx-auto mb-8" />
          </div>
          <h1 className="text-6xl md:text-7xl font-black drop-shadow-2xl mb-4">Vías del Chocó</h1>
          <p className="text-xl md:text-2xl text-gray-100 drop-shadow-lg mb-12">Información actualizada sobre el estado de las carreteras</p>
          
          {/* Botones de auth */}
          <div className="flex flex-col sm:flex-row gap-4 justify-center">
            <button 
              onClick={() => setShowLogin(true)}
              className="px-8 py-3 bg-white text-black font-bold rounded-lg shadow-lg hover:bg-gray-100 transition text-lg"
            >
              Iniciar sesión
            </button>
            <button 
              onClick={() => setShowRegister(true)}
              className="px-8 py-3 bg-blue-600 text-white font-bold rounded-lg shadow-lg hover:bg-blue-700 transition text-lg"
            >
              Registrarse
            </button>
          </div>
        </div>

        {/* Modales */}
        {showLogin && (
          <LoginModal 
            onClose={() => setShowLogin(false)} 
            onShowRegister={() => { setShowLogin(false); setShowRegister(true); }}
            onLogin={(email, role) => { 
                const localPart = String(email).toLowerCase().split('@')[0] || '';
                // Admin if role provided as 'admin' OR local-part equals 'admin' or ends with '.admin'
                const isAdminUser = (role === 'admin') || localPart === 'admin' || localPart.endsWith('.admin');
                setIsAuthenticated(true); 
                setUserName(email); 
                setIsAdmin(isAdminUser);
                localStorage.setItem('currentUser', email);
                setShowLogin(false); 
              }}
          />
        )}
        {showRegister && (
          <RegisterModal 
            onClose={() => setShowRegister(false)}
            onRegister={(name, email, password) => { 
                const localPart = String(email).toLowerCase().split('@')[0] || '';
                const isAdminUser = localPart === 'admin' || localPart.endsWith('.admin');
                setIsAuthenticated(true); 
                setUserName(email); 
                setIsAdmin(isAdminUser);
                // Guardar el email como usuario actual (consistente para admin check)
                localStorage.setItem('currentUser', email);
                const newUser = { name, email, password, blocked: false, role: isAdminUser ? 'admin' : 'user' };
                setUsers(prev => [...prev, newUser]);
                // Enviar usuario al servidor si está disponible
                if (apiAvailable) {
                  fetch('/.netlify/functions/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newUser)
                  }).catch(err => console.warn('Error al guardar usuario en servidor:', err.message));
                }
                setShowRegister(false); 
              }}
          />
        )}
      </div>
    );
  }

  // Si autenticado, muestra contenido principal
  // Si es admin y quiere ver el panel, mostrar la subpágina admin en lugar del contenido principal
  if (view === 'admin') {
    return (
      <div className="app min-h-screen bg-white">

      </div>
    );
  }

        <div className="absolute inset-0 bg-black/30"></div>
        <div className="relative z-10 text-center w-full">
          <h1 className="text-5xl md:text-6xl font-black text-white drop-shadow-lg mb-2">Vías del Chocó</h1>
          <p className="text-lg md:text-2xl text-gray-100 drop-shadow mb-4">Información actualizada sobre el estado de las carreteras</p>
        </div>
        {/* Menú flotante sticky */}
        <nav className="fixed top-0 left-0 w-full bg-white/95 backdrop-blur-lg shadow-xl border-b-2 border-blue-600 flex items-center justify-between px-6 py-4 md:px-12 md:py-5 z-50">
          <div className="flex items-center gap-3">
            <span className="font-black text-xl md:text-2xl text-blue-700">Vías del Chocó</span>
          </div>
          <div className="hidden md:flex gap-8 items-center">
            <button className={`font-semibold px-5 py-2.5 rounded-xl transition-all duration-200 ${activeTab==='all' ? 'bg-blue-100 text-blue-700 shadow-md' : 'text-gray-700 hover:bg-gray-100 hover:shadow-sm'}`} onClick={()=>setActiveTab('all')}>Todos los Reportes</button>
            <button className={`font-semibold px-5 py-2.5 rounded-xl transition-all duration-200 ${activeTab==='recent' ? 'bg-blue-100 text-blue-700 shadow-md' : 'text-gray-700 hover:bg-gray-100 hover:shadow-sm'}`} onClick={()=>setActiveTab('recent')}>Reportes Recientes</button>
            <button className="font-semibold px-5 py-2.5 rounded-xl text-gray-700 hover:bg-gray-100 hover:shadow-sm transition-all duration-200" onClick={() => { const el = document.getElementById('about-section'); if (el) el.scrollIntoView({ behavior: 'smooth' }); }}>Sobre nosotros</button>
            <div className="w-px h-6 bg-gray-300"></div>
            <div className="flex items-center gap-3">
              <span className="text-sm font-semibold text-gray-700">{userName}</span>
                    {isAdmin && (
                      <button onClick={()=>setView('admin')} className="font-semibold px-4 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700 hover:shadow-lg transition-all duration-200">Panel Admin</button>
                    )}
              <button onClick={()=>{ localStorage.removeItem('currentUser'); setIsAuthenticated(false); setIsAdmin(false); setUserName(''); setShowMenu(false); }} className="font-semibold px-5 py-2.5 rounded-xl bg-red-500 text-white hover:bg-red-600 hover:shadow-lg transition-all duration-200">Cerrar Sesión</button>
            </div>
          </div>
          {/* Menú hamburguesa móvil */}
          <div className="md:hidden">
            <button onClick={()=>setShowMenu(m=>!m)} className="p-3 rounded-xl bg-blue-100 text-blue-700 hover:bg-blue-200 transition-all duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-7 h-7"><path strokeLinecap="round" strokeLinejoin="round" d="M4.75 6.75h14.5M4.75 12h14.5M4.75 17.25h14.5" /></svg>
            </button>
            {showMenu && (
              <div className="absolute top-20 left-0 w-full bg-white/95 backdrop-blur-lg shadow-2xl rounded-b-2xl border-t border-gray-200 flex flex-col gap-3 p-6 z-50">
                <button className={`font-semibold px-5 py-3 rounded-xl transition-all duration-200 ${activeTab==='all' ? 'bg-blue-100 text-blue-700 shadow-md' : 'text-gray-700 hover:bg-gray-100'}`} onClick={()=>{setActiveTab('all');setShowMenu(false);}}>Todos los Reportes</button>
                <button className={`font-semibold px-5 py-3 rounded-xl transition-all duration-200 ${activeTab==='recent' ? 'bg-blue-100 text-blue-700 shadow-md' : 'text-gray-700 hover:bg-gray-100'}`} onClick={()=>{setActiveTab('recent');setShowMenu(false);}}>Reportes Recientes</button>
                <button className="font-semibold px-5 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition-all duration-200" onClick={()=>{ const el = document.getElementById('about-section'); if (el) el.scrollIntoView({ behavior: 'smooth' }); setShowMenu(false); }}>Sobre nosotros</button>
                <div className="border-t border-gray-200 my-2"></div>
                <div className="px-4 py-2">
                  <p className="text-xs text-gray-500 mb-2">Sesión: <span className="font-semibold text-gray-700">{userName}</span></p>
                </div>
                {isAdmin && (
                  <button onClick={()=>{ setView('admin'); setShowMenu(false); }} className="font-semibold px-5 py-3 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition-all duration-200 text-center">Panel Admin</button>
                )}
                <button onClick={()=>{ localStorage.removeItem('currentUser'); setIsAuthenticated(false); setIsAdmin(false); setUserName(''); setShowMenu(false); }} className="font-semibold px-5 py-3 rounded-xl bg-red-500 text-white hover:bg-red-600 transition-all duration-200 text-center">🚪 Cerrar Sesión</button>
              </div>
            )}
          </div>
        </nav>
      </div>

      <main className="flex-1 container mx-auto px-2 md:px-8 py-8">
        <Stats />
        <LiveRoadStatus roads={roads} />
        
        {/* Mapa en tiempo real */}
        <section className="mb-12">
          <div className="mb-4">
            <h2 className="text-3xl font-bold text-gray-800">📍 Mapa en Tiempo Real</h2>
            <p className="text-gray-600 mt-2">Visualiza la ubicación de todos los reportes de vías en el Chocó</p>
          </div>
          <MapComponent
            reports={reports}
            highlightReportId={highlightReportId}
            enableClickToSet={mapClickMode}
            onMapClick={handleMapClick}
            tempMarker={selectedCoords}
          />
          
          {/* Leyenda del mapa */}
          <div className="mt-4 bg-white p-4 rounded-lg shadow-sm border border-gray-200">

            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <div className="flex items-center gap-2">
                <div style={{width: '20px', height: '20px', backgroundColor: '#22c55e', borderRadius: '50%'}}></div>
                <span className="text-sm text-gray-700">Buena</span>
              </div>
              <div className="flex items-center gap-2">
                <div style={{width: '20px', height: '20px', backgroundColor: '#eab308', borderRadius: '50%'}}></div>
                <span className="text-sm text-gray-700">Regular</span>
              </div>
              <div className="flex items-center gap-2">
                <div style={{width: '20px', height: '20px', backgroundColor: '#f97316', borderRadius: '50%'}}></div>
                <span className="text-sm text-gray-700">Mala</span>

              <div className="flex items-center gap-2">
                <div style={{width: '20px', height: '20px', backgroundColor: '#ef4444', borderRadius: '50%'}}></div>
                <span className="text-sm text-gray-700">Cerrada</span>
              </div>
            </div>
          </div>

        <div className="flex flex-col items-center mt-8 mb-6">

            onClick={() => setShowReport(true)}

          >

            </svg>
            Hacer Reporte
          </button>
        </div>

        {/* Sección Sobre Nosotros debajo de reportes */}
        <AboutSection />
      </main>

      {/* Modal de Reporte */}
      {showReport && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4" style={{zIndex: 9999}}>
          <div className="bg-gray-50 rounded-lg shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 md:p-8 relative" style={{backgroundColor:'#f8fafc'}}>
            <button 
              onClick={() => setShowReport(false)}
              className="sticky top-0 absolute top-4 right-4 w-8 h-8 flex items-center justify-center text-gray-500 hover:text-gray-700 hover:bg-gray-200 rounded-full transition bg-white"
              style={{zIndex: 10}}
            >
              ✕
            </button>
            
            <h2 className="text-2xl md:text-3xl font-bold mb-6 pr-8" style={{color:'#030213'}}>Hacer Reporte</h2>
            <form onSubmit={async (e) => {
              e.preventDefault();
              
              // Validar que se haya seleccionado una ubicación en el mapa
              if (!selectedCoords || !selectedCoords.lat || !selectedCoords.lng) {
                alert('Por favor, selecciona la ubicación en el mapa primero');
                return;
              }
              
              const form = e.target;
              const filesInput = form.files;
              const files = Array.from(filesInput.files || []);
              
              // Convertir archivos a base64
              const filesData = [];
              for (const file of files) {
                const reader = new FileReader();
                const fileBase64 = await new Promise((resolve) => {
                  reader.onload = () => resolve(reader.result);
                  reader.readAsDataURL(file);
                });
                filesData.push({
                  name: file.name,
                  type: file.type,
                  data: fileBase64
                });
              }
              
              handleNewReport({
                title: form.road.options[form.road.selectedIndex].text,
                road: form.road.value,
                status: form.status.value,
                location: form.location.value,
                message: form.comment.value,
                rec: form.recommendations.value,
                lat: selectedCoords.lat,
                lng: selectedCoords.lng,
                files: filesData
              });
            }} className="space-y-4">

                  <option value="Buena">Buena - Transitable sin problemas</option>
                  <option value="Regular">Regular - Algunos baches o demoras</option>
                  <option value="Mala">Mala - Muy deteriorada</option>
                  <option value="Cerrada">Cerrada - Intransitable</option>

              </div>

              {/* Sección de ubicación en el mapa - PRIMERO */}
              <div className="bg-gradient-to-r from-blue-50 to-blue-100 p-4 rounded-lg border-2 border-blue-300">

                <p className="text-xs md:text-sm text-gray-600 mb-3">Haz clic en el mapa para marcar exactamente dónde está el problema. El sistema capturará automáticamente las coordenadas.</p>
                
                {selectedCoords ? (
                  <div className="bg-green-50 border-l-4 border-green-500 p-3 rounded">

                  </div>

                  className={`w-full mt-3 px-4 py-3 rounded-lg font-bold transition text-sm md:text-base ${

                      ? 'bg-red-500 text-white hover:bg-red-600 shadow-lg'

                  }`}

              </div>

              </div>

              <div>
                <label htmlFor="report-comment" className="block text-sm font-semibold mb-2" style={{color:'#030213'}}>Descripción del Estado</label>
                <textarea id="report-comment" name="comment" rows="3" placeholder="Describe el problema..." className="w-full px-3 md:px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 transition text-sm md:text-base" style={{borderColor:'#bfdbfe', backgroundColor:'white', color:'#1a1a1a'}}></textarea>
              </div>

              <div>
                <label htmlFor="report-recommendations" className="block text-sm font-semibold mb-2" style={{color:'#030213'}}>Recomendaciones</label>

              </div>
             
              <div>
                <label htmlFor="report-files" className="block text-sm font-semibold mb-2" style={{color:'#030213'}}>Adjuntar Archivos (Fotos/Videos)</label>
                <input 
                  type="file" 
                  id="report-files" 
                  name="files" 
                  multiple 
                  accept="image/*,video/*"
                  className="w-full px-3 md:px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 transition cursor-pointer text-sm md:text-base"
                  style={{borderColor:'#bfdbfe', backgroundColor:'white', color:'#1a1a1a'}}
                />
                <p className="text-xs mt-1" style={{color:'#717182'}}>Soporta imágenes y videos. Máximo 5 archivos.</p>
              </div>

              <div className="flex gap-2 justify-end pt-4">
                <button type="button" onClick={() => setShowReport(false)} className="px-4 py-2 font-semibold rounded-lg transition text-sm md:text-base" style={{color:'#717182', backgroundColor:'#efefff'}}>
                  Cancelar
                </button>
                <button type="submit" className="px-6 py-2 text-white font-bold rounded-lg transition text-sm md:text-base" style={{backgroundColor:'#030213'}}>
                  Enviar Reporte
                </button>
              </div>
            </form>
          </div>
        </div>
